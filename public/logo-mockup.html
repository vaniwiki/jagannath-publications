<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Mockup — Three Round Peacock Feathers</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #faf6ee; color: #2a100a; padding: 40px; margin: 0; }
    h1 { font-family: Georgia, serif; font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #6b5d4d; margin-bottom: 30px; font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      text-align: center;
    }
    .card-name {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #6b2920;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <h1>Three Round Peacock Feathers</h1>
  <p>Big, round, bulbous feather shapes — like the original peacock feather but in a lotus formation.</p>

  <div class="grid">

    <!-- V1: Round bulbs, gentle tilt -->
    <div class="card">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <!-- LEFT FEATHER (-30deg) -->
        <g transform="rotate(-30 80 100)">
          <!-- Outer bulb -->
          <ellipse cx="80" cy="60" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <!-- Inner bulb -->
          <ellipse cx="80" cy="65" rx="16" ry="32" fill="#5a8d99"/>
          <!-- Eye outer ring -->
          <circle cx="80" cy="60" r="12" fill="#1a4a55"/>
          <!-- Eye gold -->
          <circle cx="80" cy="60" r="8" fill="#d4a534"/>
          <!-- Eye core -->
          <circle cx="80" cy="60" r="4" fill="#1a4a55"/>
          <!-- Highlight -->
          <ellipse cx="78" cy="58" rx="2" ry="2.5" fill="#f0d088"/>
        </g>

        <!-- RIGHT FEATHER (+30deg) -->
        <g transform="rotate(30 80 100)">
          <ellipse cx="80" cy="60" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="80" cy="65" rx="16" ry="32" fill="#5a8d99"/>
          <circle cx="80" cy="60" r="12" fill="#1a4a55"/>
          <circle cx="80" cy="60" r="8" fill="#d4a534"/>
          <circle cx="80" cy="60" r="4" fill="#1a4a55"/>
          <ellipse cx="78" cy="58" rx="2" ry="2.5" fill="#f0d088"/>
        </g>

        <!-- CENTER FEATHER (taller, prominent) -->
        <ellipse cx="80" cy="65" rx="26" ry="55" fill="#4a7c89" opacity="0.5"/>
        <ellipse cx="80" cy="70" rx="20" ry="42" fill="#5a8d99"/>
        <circle cx="80" cy="55" r="16" fill="#1a4a55"/>
        <circle cx="80" cy="55" r="11" fill="#d4a534"/>
        <circle cx="80" cy="55" r="5.5" fill="#1a4a55"/>
        <ellipse cx="77" cy="52" rx="2.5" ry="3" fill="#f0d088"/>
      </svg>
      <div class="card-name">V1 — Round Trio (30°)</div>
    </div>

    <!-- V2: Wider tilt -->
    <div class="card">
      <svg viewBox="0 0 180 160" width="180" height="160">
        <g transform="rotate(-50 90 110)">
          <ellipse cx="90" cy="65" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="70" rx="16" ry="32" fill="#5a8d99"/>
          <circle cx="90" cy="65" r="12" fill="#1a4a55"/>
          <circle cx="90" cy="65" r="8" fill="#d4a534"/>
          <circle cx="90" cy="65" r="4" fill="#1a4a55"/>
          <ellipse cx="88" cy="63" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <g transform="rotate(50 90 110)">
          <ellipse cx="90" cy="65" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="70" rx="16" ry="32" fill="#5a8d99"/>
          <circle cx="90" cy="65" r="12" fill="#1a4a55"/>
          <circle cx="90" cy="65" r="8" fill="#d4a534"/>
          <circle cx="90" cy="65" r="4" fill="#1a4a55"/>
          <ellipse cx="88" cy="63" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <ellipse cx="90" cy="65" rx="26" ry="55" fill="#4a7c89" opacity="0.5"/>
        <ellipse cx="90" cy="70" rx="20" ry="42" fill="#5a8d99"/>
        <circle cx="90" cy="55" r="16" fill="#1a4a55"/>
        <circle cx="90" cy="55" r="11" fill="#d4a534"/>
        <circle cx="90" cy="55" r="5.5" fill="#1a4a55"/>
        <ellipse cx="87" cy="52" rx="2.5" ry="3" fill="#f0d088"/>
      </svg>
      <div class="card-name">V2 — Open Lotus (50°)</div>
    </div>

    <!-- V3: All same size -->
    <div class="card">
      <svg viewBox="0 0 180 160" width="180" height="160">
        <g transform="rotate(-40 90 105)">
          <ellipse cx="90" cy="60" rx="24" ry="48" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="65" rx="18" ry="38" fill="#5a8d99"/>
          <circle cx="90" cy="55" r="14" fill="#1a4a55"/>
          <circle cx="90" cy="55" r="10" fill="#d4a534"/>
          <circle cx="90" cy="55" r="5" fill="#1a4a55"/>
          <ellipse cx="88" cy="53" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <g transform="rotate(40 90 105)">
          <ellipse cx="90" cy="60" rx="24" ry="48" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="65" rx="18" ry="38" fill="#5a8d99"/>
          <circle cx="90" cy="55" r="14" fill="#1a4a55"/>
          <circle cx="90" cy="55" r="10" fill="#d4a534"/>
          <circle cx="90" cy="55" r="5" fill="#1a4a55"/>
          <ellipse cx="88" cy="53" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <ellipse cx="90" cy="60" rx="24" ry="48" fill="#4a7c89" opacity="0.5"/>
        <ellipse cx="90" cy="65" rx="18" ry="38" fill="#5a8d99"/>
        <circle cx="90" cy="55" r="14" fill="#1a4a55"/>
        <circle cx="90" cy="55" r="10" fill="#d4a534"/>
        <circle cx="90" cy="55" r="5" fill="#1a4a55"/>
        <ellipse cx="88" cy="53" rx="2" ry="2.5" fill="#f0d088"/>
      </svg>
      <div class="card-name">V3 — Equal Trio</div>
    </div>

    <!-- V4: Even rounder/fatter -->
    <div class="card">
      <svg viewBox="0 0 180 160" width="180" height="160">
        <g transform="rotate(-35 90 105)">
          <ellipse cx="90" cy="60" rx="28" ry="44" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="65" rx="22" ry="35" fill="#5a8d99"/>
          <circle cx="90" cy="55" r="15" fill="#1a4a55"/>
          <circle cx="90" cy="55" r="11" fill="#d4a534"/>
          <circle cx="90" cy="55" r="5.5" fill="#1a4a55"/>
          <ellipse cx="88" cy="53" rx="2.5" ry="3" fill="#f0d088"/>
        </g>
        <g transform="rotate(35 90 105)">
          <ellipse cx="90" cy="60" rx="28" ry="44" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="65" rx="22" ry="35" fill="#5a8d99"/>
          <circle cx="90" cy="55" r="15" fill="#1a4a55"/>
          <circle cx="90" cy="55" r="11" fill="#d4a534"/>
          <circle cx="90" cy="55" r="5.5" fill="#1a4a55"/>
          <ellipse cx="88" cy="53" rx="2.5" ry="3" fill="#f0d088"/>
        </g>
        <ellipse cx="90" cy="60" rx="30" ry="55" fill="#4a7c89" opacity="0.5"/>
        <ellipse cx="90" cy="65" rx="24" ry="44" fill="#5a8d99"/>
        <circle cx="90" cy="50" r="18" fill="#1a4a55"/>
        <circle cx="90" cy="50" r="13" fill="#d4a534"/>
        <circle cx="90" cy="50" r="6.5" fill="#1a4a55"/>
        <ellipse cx="87" cy="47" rx="3" ry="3.5" fill="#f0d088"/>
      </svg>
      <div class="card-name">V4 — Extra Round (35°)</div>
    </div>

    <!-- V5: With stem/base -->
    <div class="card">
      <svg viewBox="0 0 180 180" width="180" height="180">
        <g transform="rotate(-40 90 130)">
          <ellipse cx="90" cy="80" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="85" rx="16" ry="32" fill="#5a8d99"/>
          <circle cx="90" cy="78" r="12" fill="#1a4a55"/>
          <circle cx="90" cy="78" r="8" fill="#d4a534"/>
          <circle cx="90" cy="78" r="4" fill="#1a4a55"/>
          <ellipse cx="88" cy="76" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <g transform="rotate(40 90 130)">
          <ellipse cx="90" cy="80" rx="22" ry="42" fill="#4a7c89" opacity="0.5"/>
          <ellipse cx="90" cy="85" rx="16" ry="32" fill="#5a8d99"/>
          <circle cx="90" cy="78" r="12" fill="#1a4a55"/>
          <circle cx="90" cy="78" r="8" fill="#d4a534"/>
          <circle cx="90" cy="78" r="4" fill="#1a4a55"/>
          <ellipse cx="88" cy="76" rx="2" ry="2.5" fill="#f0d088"/>
        </g>
        <ellipse cx="90" cy="75" rx="26" ry="55" fill="#4a7c89" opacity="0.5"/>
        <ellipse cx="90" cy="80" rx="20" ry="42" fill="#5a8d99"/>
        <circle cx="90" cy="65" r="16" fill="#1a4a55"/>
        <circle cx="90" cy="65" r="11" fill="#d4a534"/>
        <circle cx="90" cy="65" r="5.5" fill="#1a4a55"/>
        <ellipse cx="87" cy="62" rx="2.5" ry="3" fill="#f0d088"/>
        <!-- Decorative gold curve -->
        <path d="M 50 145 Q 90 155 130 145" fill="none" stroke="#d4a534" stroke-width="2" opacity="0.5"/>
      </svg>
      <div class="card-name">V5 — With Base Curve</div>
    </div>

  </div>

</body>
</html>
